<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Abastecimento</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Calculadora de Abastecimento</h1>
        <hr>
        
        <div class="precos">
            <p><strong>Tabela de Preços:</strong></p>
            <ul>
                <li>Gasolina: R$ 6,69</li>
                <li>Etanol: R$ 4,30</li>
                <li>Diesel: R$ 6,03</li>
            </ul>
        </div>

        <form id="formularioAbastecimento">
            <div class="input-group">
                <label for="combustivel">Tipo de Combustível</label>
                <select id="combustivel">
                    <option value="">Escolha uma opção</option>
                    <option value="gasolina">Gasolina</option>
                    <option value="etanol">Etanol</option>
                    <option value="diesel">Diesel</option>
                </select>
            </div>

            <div class="input-group">
                <label for="litros">Quantidade (litros)</label>
                <input type="number" min="0" step="0.1" id="litros" placeholder="Ex: 20.5">
            </div>
        </form>

        <div class="resultado-box">
            <h2>Total a Pagar</h2>
            <p id="resultado">R$ 0,00</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
